<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #222; color: #fff; font-family: sans-serif; padding: 20px; }
  .row { display: flex; gap: 30px; align-items: center; margin: 20px 0; }
  .sprite { background: #444; border: 1px solid #666; padding: 10px; text-align: center; }
  .sprite img { display: block; margin: 0 auto 8px; }
  h2 { margin-top: 30px; }
</style>
</head>
<body>
<h1>Sprite Preview</h1>

<h2>Bomb Powerup (128x128)</h2>
<div class="row">
  <div class="sprite">
    <img src="/assets/sprites/cozy-kitchen/powerups/powerup-bomb.png" style="width:128px;height:128px;">
    <div>128x128 (actual)</div>
  </div>
  <div class="sprite">
    <img src="/assets/sprites/cozy-kitchen/powerups/powerup-bomb.png" style="width:172px;height:172px;">
    <div>172px (1.35x scaled)</div>
  </div>
</div>

<h2>NEW Popcorn Particles (128x128 each)</h2>
<div class="row">
  <div class="sprite">
    <img src="/assets/sprites/cozy-kitchen/particles/popcorn-1.png" style="width:128px;height:128px;">
    <div>popcorn-1 (128x128)</div>
  </div>
  <div class="sprite">
    <img src="/assets/sprites/cozy-kitchen/particles/popcorn-2.png" style="width:128px;height:128px;">
    <div>popcorn-2 (128x128)</div>
  </div>
  <div class="sprite">
    <img src="/assets/sprites/cozy-kitchen/particles/popcorn-3.png" style="width:128px;height:128px;">
    <div>popcorn-3 (128x128)</div>
  </div>
</div>

<h2>Rocket (for comparison)</h2>
<div class="row">
  <div class="sprite">
    <img src="/assets/sprites/cozy-kitchen/powerups/powerup-rocket.png" style="width:128px;height:128px;">
    <div>powerup-rocket (128px)</div>
  </div>
</div>
</body>
</html>
