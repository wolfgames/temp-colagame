<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="stoneGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b8b0a8"/>
      <stop offset="35%" stop-color="#9a9189"/>
      <stop offset="100%" stop-color="#736b63"/>
    </linearGradient>
    <radialGradient id="highlight1" cx="0.3" cy="0.25" r="0.5">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Base stone -->
  <rect x="4" y="4" width="120" height="120" rx="14" ry="14" fill="url(#stoneGrad1)"/>
  <!-- Top bevel highlight -->
  <rect x="4" y="4" width="120" height="55" rx="14" ry="14" fill="url(#highlight1)"/>
  <!-- Bottom edge shadow -->
  <rect x="4" y="80" width="120" height="44" rx="14" ry="14" fill="#5c554e" opacity="0.25"/>
  <!-- Surface texture -->
  <circle cx="30" cy="45" r="2" fill="#8a827a" opacity="0.4"/>
  <circle cx="75" cy="35" r="1.5" fill="#8a827a" opacity="0.3"/>
  <circle cx="55" cy="70" r="2.5" fill="#8a827a" opacity="0.35"/>
  <circle cx="95" cy="55" r="1.8" fill="#8a827a" opacity="0.3"/>
  <circle cx="40" cy="90" r="2" fill="#8a827a" opacity="0.25"/>
  <circle cx="85" cy="85" r="1.5" fill="#8a827a" opacity="0.3"/>
  <!-- Rim highlight -->
  <rect x="4" y="4" width="120" height="120" rx="14" ry="14" fill="none" stroke="#d4cdc5" stroke-width="1.5" opacity="0.5"/>
  <!-- Specular dot -->
  <ellipse cx="38" cy="28" rx="12" ry="8" fill="white" opacity="0.3"/>
  <!-- CRACK 1: diagonal from upper-left toward center -->
  <path d="M 35 22 L 48 42 L 42 55 L 58 68" fill="none" stroke="#3d3630" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <path d="M 48 42 L 38 48" fill="none" stroke="#3d3630" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Crack shadow (depth) -->
  <path d="M 36 23 L 49 43 L 43 56 L 59 69" fill="none" stroke="#1a1512" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
</svg>
