<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="stoneGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b0a89f"/>
      <stop offset="35%" stop-color="#928a82"/>
      <stop offset="100%" stop-color="#6b6359"/>
    </linearGradient>
    <radialGradient id="highlight2" cx="0.3" cy="0.25" r="0.5">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Base stone (slightly darker — worn) -->
  <rect x="4" y="4" width="120" height="120" rx="14" ry="14" fill="url(#stoneGrad2)"/>
  <!-- Top bevel highlight (dimmer) -->
  <rect x="4" y="4" width="120" height="55" rx="14" ry="14" fill="url(#highlight2)"/>
  <!-- Bottom edge shadow -->
  <rect x="4" y="80" width="120" height="44" rx="14" ry="14" fill="#5c554e" opacity="0.3"/>
  <!-- Surface texture -->
  <circle cx="30" cy="45" r="2" fill="#8a827a" opacity="0.4"/>
  <circle cx="75" cy="35" r="1.5" fill="#8a827a" opacity="0.3"/>
  <circle cx="95" cy="55" r="1.8" fill="#8a827a" opacity="0.3"/>
  <circle cx="85" cy="85" r="1.5" fill="#8a827a" opacity="0.3"/>
  <!-- Rim highlight -->
  <rect x="4" y="4" width="120" height="120" rx="14" ry="14" fill="none" stroke="#d4cdc5" stroke-width="1.5" opacity="0.35"/>
  <!-- Specular dot (faded) -->
  <ellipse cx="38" cy="28" rx="10" ry="6" fill="white" opacity="0.2"/>
  <!-- CRACK 1: diagonal from upper-left -->
  <path d="M 35 22 L 48 42 L 42 55 L 58 68" fill="none" stroke="#3d3630" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <path d="M 48 42 L 38 48" fill="none" stroke="#3d3630" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M 36 23 L 49 43 L 43 56 L 59 69" fill="none" stroke="#1a1512" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
  <!-- CRACK 2: from upper-right branching down -->
  <path d="M 92 28 L 78 48 L 82 62 L 68 80" fill="none" stroke="#3d3630" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <path d="M 78 48 L 88 56" fill="none" stroke="#3d3630" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M 82 62 L 72 58" fill="none" stroke="#3d3630" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
  <path d="M 93 29 L 79 49 L 83 63 L 69 81" fill="none" stroke="#1a1512" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
  <!-- CRACK 3: horizontal split connecting the two -->
  <path d="M 28 65 L 45 60 L 64 64 L 80 58 L 100 62" fill="none" stroke="#3d3630" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.65"/>
  <path d="M 29 66 L 46 61 L 65 65 L 81 59 L 101 63" fill="none" stroke="#1a1512" stroke-width="1" stroke-linecap="round" opacity="0.25"/>
  <!-- Chip/debris marks near cracks -->
  <circle cx="52" cy="60" r="3" fill="#5c554e" opacity="0.3"/>
  <circle cx="76" cy="55" r="2.5" fill="#5c554e" opacity="0.25"/>
</svg>
